name: CI

on:
	push:
		branches:
			- main
			- chore/ci-oracles
	pull_request:
		branches:
			- main

jobs:
	validate:
		runs-on: ubuntu-latest

		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Set up Node.js
				uses: actions/setup-node@v4
				with:
					node-version: 20
					cache: npm
					cache-dependency-path: frontend/package-lock.json

			- name: Set up Python
				uses: actions/setup-python@v5
				with:
					python-version: "3.12"
					cache: pip

			- name: Install Slither
				run: python -m pip install --upgrade pip slither-analyzer

			- name: Set up Foundry
				uses: foundry-rs/foundry-toolchain@v1
				with:
					version: stable

			- name: Build contracts
				run: forge build --force

			- name: Run Foundry tests
				run: |
					forge test --match-path test/core/AMM.t.sol
					forge test --match-path test/core/AMMInvariant.t.sol
					forge test --match-path test/core/YieldVault.t.sol
					forge test --match-path test/integration/Fork.t.sol

			- name: Run Slither analysis
				run: slither . --config-file slither.config.json --json slither-report.json

			- name: Install frontend dependencies
				working-directory: frontend
				run: npm ci

			- name: Build frontend
				working-directory: frontend
				run: npm run build
