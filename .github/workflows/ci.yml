name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
  pull_request:
    branches:
      - main
      - "feat/**"
      - "chore/**"

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        run: forge build --force

      - name: Run Foundry tests
        run: |
          forge test --match-path test/core/AMM.t.sol
          forge test --match-path test/core/AMMInvariant.t.sol
          forge test --match-path test/core/YieldVault.t.sol
          forge test --match-path test/oracles/PriceOracle.t.sol
          forge test --match-path test/integration/Fork.t.sol
          forge test --match-path test/integration/ForkSepolia.t.sol

  slither:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Slither
        run: python -m pip install --upgrade pip slither-analyzer

      - name: Build contracts
        run: forge build --force

      - name: Run Slither on oracle contracts
        run: |
          slither src/oracles --config-file slither.config.json --fail-medium --json slither-oracle-report.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
